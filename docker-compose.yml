services:
  api:
    build:
      context: .
    container_name: krabs-api
    env_file:
      - .env
    environment:
      APP_ENV: local
      COMMUNICATION_PROVIDER: memory
      SCHEDULER_ENABLED: "false"
      COSMOS_CONNECTION_STRING: AccountEndpoint=http://cosmos-db:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==;
      COSMOS_DATABASE: krabs
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      - cosmos-db
    command: uvicorn krabs_application.fastapi_app:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src

  cosmos-db:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
    container_name: krabs-cosmos-db
    environment:
      ENABLE_TELEMETRY: "false"
    ports:
      - "8081:8081"
      - "8080:8080"
      - "1234:1234"
    volumes:
      - cosmos-data:/data

volumes:
  cosmos-data:
