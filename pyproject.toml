[project]
name = "tjabane-agent-julius"
version = "0.1.0"
description = "Personal Investec banking agent accessible via WhatsApp"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "openai>=1.75.0",
    "azure-functions>=1.21.0,<2.0",
    "azure-cosmos>=4.9.0",
    "azure-communication-email>=1.0.0",
    "azure-keyvault-secrets>=4.8.0",
    "azure-identity>=1.19.0",
    "twilio>=9.4.0",
    "httpx>=0.28.0",
    "pydantic>=2.10.0",
    "python-dotenv>=1.0.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.14",
]

[tool.pytest.ini_options]
testpaths = ["tests/julius_unit_tests", "tests/julius_integration_tests"]
pythonpath = ["src"]
markers = ["integration: live sandbox tests (require credentials)"]

[tool.hatch.build.targets.wheel]
sources = ["src"]
packages = ["src/agent", "src/functions", "src/julius_domain", "src/julius_services"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
