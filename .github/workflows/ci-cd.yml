name: CI/CD

on:
  push:
  pull_request:
    branches: [master]

jobs:
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests with coverage
        run: uv run pytest tests/julius_unit_tests/ -v --cov --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage.xml

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.event_name == 'pull_request'

    env:
      INVESTEC_CLIENT_ID: ${{ secrets.INVESTEC_CLIENT_ID }}
      INVESTEC_CLIENT_SECRET: ${{ secrets.INVESTEC_CLIENT_SECRET }}
      INVESTEC_API_KEY: ${{ secrets.INVESTEC_API_KEY }}
      INVESTEC_SANDBOX: "true"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      COSMOS_CONNECTION_STRING: ${{ secrets.COSMOS_CONNECTION_STRING }}
      COSMOS_DATABASE: julius
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER }}
      AZURE_COMMUNICATION_CONNECTION_STRING: ${{ secrets.AZURE_COMMUNICATION_CONNECTION_STRING }}
      EMAIL_SENDER_ADDRESS: ${{ secrets.EMAIL_SENDER_ADDRESS }}
      EMAIL_RECIPIENT_ADDRESS: ${{ secrets.EMAIL_RECIPIENT_ADDRESS }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run integration tests
        run: uv run pytest tests/julius_integration_tests/ -v

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          category: "/language:python"

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Bandit (code security)
        run: uvx bandit -r src/ function_app.py -ll

      - name: pip-audit (dependency vulnerabilities)
        run: uvx pip-audit

  sonarcloud:
    name: SonarCloud scan
    needs: test-unit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-report

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e # master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy-dev:
    name: Deploy to dev
    needs: [test-unit, test-integration, sonarcloud, security-scan, codeql]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    env:
      AZURE_RESOURCE_GROUP: rg-julius-dev
      AZURE_LOCATION: southafricanorth
      APP_NAME: julius-dev
      APP_ENV: dev
      INVESTEC_SANDBOX: "true"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          python-version: "3.12"

      - name: Generate requirements.txt
        run: |
          uv export --no-dev --no-hashes -o requirements.txt
          sed -i '/^-e /d' requirements.txt

      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Azure infrastructure
        id: infra
        run: |
          deploying_principal_app_id="$(az account show --query user.name --output tsv)"
          deploying_principal_object_id="$(az ad sp show --id "$deploying_principal_app_id" --query id --output tsv)"

          az group create \
            --name "$AZURE_RESOURCE_GROUP" \
            --location "$AZURE_LOCATION" \
            --output none

          outputs="$(az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infrastructure/main.bicep \
            --parameters \
              appName="$APP_NAME" \
              location="$AZURE_LOCATION" \
              appEnvironment="$APP_ENV" \
              investecSandbox="$INVESTEC_SANDBOX" \
              deployingUserObjectId="$deploying_principal_object_id" \
            --query properties.outputs \
            --output json)"

          echo "function_app_name=$(jq -r '.functionAppName.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"
          echo "key_vault_name=$(jq -r '.keyVaultName.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"
          echo "cosmos_account_name=$(jq -r '.cosmosAccountName.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"
          echo "acs_name=$(jq -r '.acsName.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"

      - name: Populate generated Key Vault secrets
        env:
          KEY_VAULT_NAME: ${{ steps.infra.outputs.key_vault_name }}
          COSMOS_ACCOUNT_NAME: ${{ steps.infra.outputs.cosmos_account_name }}
          ACS_NAME: ${{ steps.infra.outputs.acs_name }}
        run: |
          cosmos_connection_string="$(az cosmosdb keys list \
            --name "$COSMOS_ACCOUNT_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --type connection-strings \
            --query "connectionStrings[0].connectionString" \
            --output tsv)"

          acs_connection_string="$(az communication list-key \
            --name "$ACS_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "primaryConnectionString" \
            --output tsv)"

          az keyvault secret set \
            --vault-name "$KEY_VAULT_NAME" \
            --name cosmos-connection-string \
            --value "$cosmos_connection_string" \
            --output none

          az keyvault secret set \
            --vault-name "$KEY_VAULT_NAME" \
            --name acs-connection-string \
            --value "$acs_connection_string" \
            --output none

      - name: Populate external Key Vault secrets
        env:
          KEY_VAULT_NAME: ${{ steps.infra.outputs.key_vault_name }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INVESTEC_CLIENT_ID: ${{ secrets.INVESTEC_CLIENT_ID }}
          INVESTEC_CLIENT_SECRET: ${{ secrets.INVESTEC_CLIENT_SECRET }}
          INVESTEC_API_KEY: ${{ secrets.INVESTEC_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER }}
          EMAIL_RECIPIENT_ADDRESS: ${{ secrets.EMAIL_RECIPIENT_ADDRESS }}
        run: |
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name openai-api-key --value "$OPENAI_API_KEY" --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name investec-client-id --value "$INVESTEC_CLIENT_ID" --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name investec-client-secret --value "$INVESTEC_CLIENT_SECRET" --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name investec-api-key --value "$INVESTEC_API_KEY" --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name twilio-account-sid --value "$TWILIO_ACCOUNT_SID" --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name twilio-auth-token --value "$TWILIO_AUTH_TOKEN" --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name twilio-whatsapp-number --value "$TWILIO_WHATSAPP_NUMBER" --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name email-recipient-address --value "$EMAIL_RECIPIENT_ADDRESS" --output none

      - name: Deploy to Azure Functions
        uses: azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593 # v1
        with:
          app-name: ${{ steps.infra.outputs.function_app_name }}
          package: .
          scm-do-build-during-deployment: true
          enable-oryx-build: true

  deploy-prod:
    name: Deploy to prod
    needs: deploy-dev
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: prod
    env:
      AZURE_RESOURCE_GROUP: rg-julius-prod
      AZURE_LOCATION: southafricanorth
      APP_NAME: julius-prod
      APP_ENV: prod
      INVESTEC_SANDBOX: "false"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          python-version: "3.12"

      - name: Generate requirements.txt
        run: |
          uv export --no-dev --no-hashes -o requirements.txt
          sed -i '/^-e /d' requirements.txt

      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Azure infrastructure
        id: infra
        run: |
          deploying_principal_app_id="$(az account show --query user.name --output tsv)"
          deploying_principal_object_id="$(az ad sp show --id "$deploying_principal_app_id" --query id --output tsv)"

          az group create \
            --name "$AZURE_RESOURCE_GROUP" \
            --location "$AZURE_LOCATION" \
            --output none

          outputs="$(az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infrastructure/main.bicep \
            --parameters \
              appName="$APP_NAME" \
              location="$AZURE_LOCATION" \
              appEnvironment="$APP_ENV" \
              investecSandbox="$INVESTEC_SANDBOX" \
              deployingUserObjectId="$deploying_principal_object_id" \
            --query properties.outputs \
            --output json)"

          echo "function_app_name=$(jq -r '.functionAppName.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"
          echo "key_vault_name=$(jq -r '.keyVaultName.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"
          echo "cosmos_account_name=$(jq -r '.cosmosAccountName.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"
          echo "acs_name=$(jq -r '.acsName.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"

      - name: Populate generated Key Vault secrets
        env:
          KEY_VAULT_NAME: ${{ steps.infra.outputs.key_vault_name }}
          COSMOS_ACCOUNT_NAME: ${{ steps.infra.outputs.cosmos_account_name }}
          ACS_NAME: ${{ steps.infra.outputs.acs_name }}
        run: |
          cosmos_connection_string="$(az cosmosdb keys list \
            --name "$COSMOS_ACCOUNT_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --type connection-strings \
            --query "connectionStrings[0].connectionString" \
            --output tsv)"

          acs_connection_string="$(az communication list-key \
            --name "$ACS_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "primaryConnectionString" \
            --output tsv)"

          az keyvault secret set \
            --vault-name "$KEY_VAULT_NAME" \
            --name cosmos-connection-string \
            --value "$cosmos_connection_string" \
            --output none

          az keyvault secret set \
            --vault-name "$KEY_VAULT_NAME" \
            --name acs-connection-string \
            --value "$acs_connection_string" \
            --output none

      - name: Populate external Key Vault secrets
        env:
          KEY_VAULT_NAME: ${{ steps.infra.outputs.key_vault_name }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INVESTEC_CLIENT_ID: ${{ secrets.INVESTEC_CLIENT_ID }}
          INVESTEC_CLIENT_SECRET: ${{ secrets.INVESTEC_CLIENT_SECRET }}
          INVESTEC_API_KEY: ${{ secrets.INVESTEC_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER }}
          EMAIL_RECIPIENT_ADDRESS: ${{ secrets.EMAIL_RECIPIENT_ADDRESS }}
        run: |
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name openai-api-key --value "$OPENAI_API_KEY" --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name investec-client-id --value "$INVESTEC_CLIENT_ID" --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name investec-client-secret --value "$INVESTEC_CLIENT_SECRET" --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name investec-api-key --value "$INVESTEC_API_KEY" --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name twilio-account-sid --value "$TWILIO_ACCOUNT_SID" --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name twilio-auth-token --value "$TWILIO_AUTH_TOKEN" --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name twilio-whatsapp-number --value "$TWILIO_WHATSAPP_NUMBER" --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name email-recipient-address --value "$EMAIL_RECIPIENT_ADDRESS" --output none

      - name: Deploy to Azure Functions
        uses: azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593 # v1
        with:
          app-name: ${{ steps.infra.outputs.function_app_name }}
          package: .
          scm-do-build-during-deployment: true
          enable-oryx-build: true
