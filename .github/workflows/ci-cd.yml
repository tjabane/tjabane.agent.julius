name: CI/CD

on:
  push:
  pull_request:
    branches: [master]

jobs:
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests with coverage
        run: uv run pytest tests/krabs_unit_tests/ -v --cov --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage.xml

  test-integration:
    name: Integration tests against dev
    needs: deploy-dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: dev

    env:
      KEY_VAULT_NAME: ${{ needs.deploy-dev.outputs.key_vault_name }}
      INVESTEC_SANDBOX: "true"
      INVESTEC_URL: https://openapisandbox.investec.com
      INVESTEC_TIMEOUT_SECONDS: "5.0"
      COSMOS_DATABASE: krabs
      EMAIL_SENDER_ADDRESS: ${{ needs.deploy-dev.outputs.email_sender_address }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Load dev secrets from Key Vault
        run: |
          set -euo pipefail

          export_secret() {
            local env_name="$1"
            local key_vault_secret_name="$2"
            local value

            value="$(az keyvault secret show \
              --vault-name "$KEY_VAULT_NAME" \
              --name "$key_vault_secret_name" \
              --query value \
              --output tsv)"

            if [ -z "$value" ]; then
              echo "::error::Key Vault secret '$key_vault_secret_name' is empty or missing."
              exit 1
            fi

            echo "::add-mask::$value"
            echo "$env_name=$value" >> "$GITHUB_ENV"
          }

          export_secret OPENAI_API_KEY openai-api-key
          export_secret INVESTEC_CLIENT_ID investec-client-id
          export_secret INVESTEC_CLIENT_SECRET investec-client-secret
          export_secret INVESTEC_API_KEY investec-api-key
          export_secret COSMOS_CONNECTION_STRING cosmos-connection-string
          export_secret TWILIO_ACCOUNT_SID twilio-account-sid
          export_secret TWILIO_AUTH_TOKEN twilio-auth-token
          export_secret TWILIO_WHATSAPP_NUMBER twilio-whatsapp-number
          export_secret AZURE_COMMUNICATION_CONNECTION_STRING acs-connection-string
          export_secret EMAIL_RECIPIENT_ADDRESS email-recipient-address

      - name: Run integration tests
        run: uv run pytest tests/krabs_integration_tests/ -v

  test-e2e:
    name: End-to-end tests against dev
    needs: deploy-dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: dev

    env:
      E2E_BASE_URL: ${{ needs.deploy-dev.outputs.container_app_url }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run end-to-end tests
        run: uv run pytest tests/krabs_e2e_tests/ -v

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          category: "/language:python"

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Bandit (code security)
        run: uvx bandit -r src/ function_app.py -ll

      - name: pip-audit (dependency vulnerabilities)
        run: uvx pip-audit

  sonarcloud:
    name: SonarCloud scan
    needs: test-unit
    runs-on: ubuntu-latest
    env:
      SONAR_SCANNER_SKIP_JRE_PROVISIONING: "true"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-report

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e # master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy-dev:
    name: Deploy to dev
    needs: [test-unit, sonarcloud, security-scan, codeql]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      key_vault_name: ${{ steps.infra.outputs.key_vault_name }}
      container_app_url: ${{ steps.infra.outputs.container_app_url }}
      email_sender_address: ${{ steps.infra.outputs.email_sender_address }}
    env:
      AZURE_RESOURCE_GROUP: rg-krabs-dev
      AZURE_LOCATION: southafricanorth
      APP_NAME: krabs-dev
      APP_ENV: dev
      INVESTEC_SANDBOX: "true"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          python-version: "3.12"

      - name: Generate requirements.txt
        run: |
          uv export --no-dev --no-hashes --no-emit-project -o requirements.txt

      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Azure infrastructure
        id: infra
        run: |
          deploying_principal_app_id="$(az account show --query user.name --output tsv)"
          deploying_principal_object_id="$(az ad sp show --id "$deploying_principal_app_id" --query id --output tsv)"

          az group create \
            --name "$AZURE_RESOURCE_GROUP" \
            --location "$AZURE_LOCATION" \
            --output none

          outputs="$(az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infrastructure/main.bicep \
            --parameters \
              appName="$APP_NAME" \
              location="$AZURE_LOCATION" \
              appEnvironment="$APP_ENV" \
              investecSandbox="$INVESTEC_SANDBOX" \
              deployingUserObjectId="$deploying_principal_object_id" \
            --query properties.outputs \
            --output json)"

          echo "key_vault_name=$(jq -r '.keyVaultName.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"
          echo "container_app_url=$(jq -r '.containerAppUrl.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"
          echo "cosmos_account_name=$(jq -r '.cosmosAccountName.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"
          echo "acs_name=$(jq -r '.acsName.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"
          echo "acr_name=$(jq -r '.acrName.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(jq -r '.acrLoginServer.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"
          echo "email_sender_address=$(jq -r '.emailSenderAddress.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"

      - name: Populate generated Key Vault secrets
        env:
          KEY_VAULT_NAME: ${{ steps.infra.outputs.key_vault_name }}
          COSMOS_ACCOUNT_NAME: ${{ steps.infra.outputs.cosmos_account_name }}
          ACS_NAME: ${{ steps.infra.outputs.acs_name }}
        run: |
          cosmos_connection_string="$(az cosmosdb keys list \
            --name "$COSMOS_ACCOUNT_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --type connection-strings \
            --query "connectionStrings[0].connectionString" \
            --output tsv)"

          acs_connection_string="$(az communication list-key \
            --name "$ACS_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "primaryConnectionString" \
            --output tsv)"

          az keyvault secret set \
            --vault-name "$KEY_VAULT_NAME" \
            --name cosmos-connection-string \
            --value "$cosmos_connection_string" \
            --output none

          az keyvault secret set \
            --vault-name "$KEY_VAULT_NAME" \
            --name acs-connection-string \
            --value "$acs_connection_string" \
            --output none

      - name: Validate and populate external Key Vault secrets
        env:
          KEY_VAULT_NAME: ${{ steps.infra.outputs.key_vault_name }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INVESTEC_CLIENT_ID: ${{ secrets.INVESTEC_CLIENT_ID }}
          INVESTEC_CLIENT_SECRET: ${{ secrets.INVESTEC_CLIENT_SECRET }}
          INVESTEC_API_KEY: ${{ secrets.INVESTEC_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER }}
          EMAIL_RECIPIENT_ADDRESS: ${{ secrets.EMAIL_RECIPIENT_ADDRESS }}
        run: |
          set -euo pipefail

          missing=()
          for secret_name in \
            OPENAI_API_KEY \
            INVESTEC_CLIENT_ID \
            INVESTEC_CLIENT_SECRET \
            INVESTEC_API_KEY \
            TWILIO_ACCOUNT_SID \
            TWILIO_AUTH_TOKEN \
            TWILIO_WHATSAPP_NUMBER \
            EMAIL_RECIPIENT_ADDRESS
          do
            if [ -z "${!secret_name:-}" ]; then
              missing+=("$secret_name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required GitHub secrets for $APP_ENV deployment: ${missing[*]}"
            exit 1
          fi

          set_secret() {
            local secret_name="$1"
            local secret_value="$2"

            if [ -z "$secret_value" ]; then
              echo "::error::Cannot set Key Vault secret '$secret_name' because the mapped GitHub secret is empty."
              exit 1
            fi

            az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name "$secret_name" --value="$secret_value" --output none
          }

          set_secret openai-api-key "$OPENAI_API_KEY"
          set_secret investec-client-id "$INVESTEC_CLIENT_ID"
          set_secret investec-client-secret "$INVESTEC_CLIENT_SECRET"
          set_secret investec-api-key "$INVESTEC_API_KEY"
          set_secret twilio-account-sid "$TWILIO_ACCOUNT_SID"
          set_secret twilio-auth-token "$TWILIO_AUTH_TOKEN"
          set_secret twilio-whatsapp-number "$TWILIO_WHATSAPP_NUMBER"
          set_secret email-recipient-address "$EMAIL_RECIPIENT_ADDRESS"

      - name: Build container image
        env:
          ACR_NAME: ${{ steps.infra.outputs.acr_name }}
          ACR_LOGIN_SERVER: ${{ steps.infra.outputs.acr_login_server }}
        run: |
          set -euo pipefail

          image_name="$APP_NAME:${GITHUB_SHA}"
          image="$ACR_LOGIN_SERVER/$image_name"

          az acr build \
            --registry "$ACR_NAME" \
            --image "$image_name" \
            . \
            --output none

          echo "container_image=$image" >> "$GITHUB_ENV"

      - name: Apply runtime configuration
        run: |
          set -euo pipefail

          deploying_principal_app_id="$(az account show --query user.name --output tsv)"
          deploying_principal_object_id="$(az ad sp show --id "$deploying_principal_app_id" --query id --output tsv)"

          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infrastructure/main.bicep \
            --parameters \
              appName="$APP_NAME" \
              location="$AZURE_LOCATION" \
              appEnvironment="$APP_ENV" \
              investecSandbox="$INVESTEC_SANDBOX" \
              deployingUserObjectId="$deploying_principal_object_id" \
              containerImage="$container_image" \
              configureRuntimeSecrets=true \
            --output none

  deploy-prod:
    name: Deploy to prod
    needs: [test-integration, test-e2e]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: prod
    env:
      AZURE_RESOURCE_GROUP: rg-krabs-prod
      AZURE_LOCATION: southafricanorth
      APP_NAME: krabs-prod
      APP_ENV: prod
      INVESTEC_SANDBOX: "false"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          python-version: "3.12"

      - name: Generate requirements.txt
        run: |
          uv export --no-dev --no-hashes --no-emit-project -o requirements.txt

      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Azure infrastructure
        id: infra
        run: |
          deploying_principal_app_id="$(az account show --query user.name --output tsv)"
          deploying_principal_object_id="$(az ad sp show --id "$deploying_principal_app_id" --query id --output tsv)"

          az group create \
            --name "$AZURE_RESOURCE_GROUP" \
            --location "$AZURE_LOCATION" \
            --output none

          outputs="$(az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infrastructure/main.bicep \
            --parameters \
              appName="$APP_NAME" \
              location="$AZURE_LOCATION" \
              appEnvironment="$APP_ENV" \
              investecSandbox="$INVESTEC_SANDBOX" \
              deployingUserObjectId="$deploying_principal_object_id" \
            --query properties.outputs \
            --output json)"

          echo "key_vault_name=$(jq -r '.keyVaultName.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"
          echo "cosmos_account_name=$(jq -r '.cosmosAccountName.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"
          echo "acs_name=$(jq -r '.acsName.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"
          echo "acr_name=$(jq -r '.acrName.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(jq -r '.acrLoginServer.value' <<< "$outputs")" >> "$GITHUB_OUTPUT"

      - name: Populate generated Key Vault secrets
        env:
          KEY_VAULT_NAME: ${{ steps.infra.outputs.key_vault_name }}
          COSMOS_ACCOUNT_NAME: ${{ steps.infra.outputs.cosmos_account_name }}
          ACS_NAME: ${{ steps.infra.outputs.acs_name }}
        run: |
          cosmos_connection_string="$(az cosmosdb keys list \
            --name "$COSMOS_ACCOUNT_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --type connection-strings \
            --query "connectionStrings[0].connectionString" \
            --output tsv)"

          acs_connection_string="$(az communication list-key \
            --name "$ACS_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "primaryConnectionString" \
            --output tsv)"

          az keyvault secret set \
            --vault-name "$KEY_VAULT_NAME" \
            --name cosmos-connection-string \
            --value "$cosmos_connection_string" \
            --output none

          az keyvault secret set \
            --vault-name "$KEY_VAULT_NAME" \
            --name acs-connection-string \
            --value "$acs_connection_string" \
            --output none

      - name: Validate and populate external Key Vault secrets
        env:
          KEY_VAULT_NAME: ${{ steps.infra.outputs.key_vault_name }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INVESTEC_CLIENT_ID: ${{ secrets.INVESTEC_CLIENT_ID }}
          INVESTEC_CLIENT_SECRET: ${{ secrets.INVESTEC_CLIENT_SECRET }}
          INVESTEC_API_KEY: ${{ secrets.INVESTEC_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER }}
          EMAIL_RECIPIENT_ADDRESS: ${{ secrets.EMAIL_RECIPIENT_ADDRESS }}
        run: |
          set -euo pipefail

          missing=()
          for secret_name in \
            OPENAI_API_KEY \
            INVESTEC_CLIENT_ID \
            INVESTEC_CLIENT_SECRET \
            INVESTEC_API_KEY \
            TWILIO_ACCOUNT_SID \
            TWILIO_AUTH_TOKEN \
            TWILIO_WHATSAPP_NUMBER \
            EMAIL_RECIPIENT_ADDRESS
          do
            if [ -z "${!secret_name:-}" ]; then
              missing+=("$secret_name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required GitHub secrets for $APP_ENV deployment: ${missing[*]}"
            exit 1
          fi

          set_secret() {
            local secret_name="$1"
            local secret_value="$2"

            if [ -z "$secret_value" ]; then
              echo "::error::Cannot set Key Vault secret '$secret_name' because the mapped GitHub secret is empty."
              exit 1
            fi

            az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name "$secret_name" --value="$secret_value" --output none
          }

          set_secret openai-api-key "$OPENAI_API_KEY"
          set_secret investec-client-id "$INVESTEC_CLIENT_ID"
          set_secret investec-client-secret "$INVESTEC_CLIENT_SECRET"
          set_secret investec-api-key "$INVESTEC_API_KEY"
          set_secret twilio-account-sid "$TWILIO_ACCOUNT_SID"
          set_secret twilio-auth-token "$TWILIO_AUTH_TOKEN"
          set_secret twilio-whatsapp-number "$TWILIO_WHATSAPP_NUMBER"
          set_secret email-recipient-address "$EMAIL_RECIPIENT_ADDRESS"

      - name: Build container image
        env:
          ACR_NAME: ${{ steps.infra.outputs.acr_name }}
          ACR_LOGIN_SERVER: ${{ steps.infra.outputs.acr_login_server }}
        run: |
          set -euo pipefail

          image_name="$APP_NAME:${GITHUB_SHA}"
          image="$ACR_LOGIN_SERVER/$image_name"

          az acr build \
            --registry "$ACR_NAME" \
            --image "$image_name" \
            . \
            --output none

          echo "container_image=$image" >> "$GITHUB_ENV"

      - name: Apply runtime configuration
        run: |
          set -euo pipefail

          deploying_principal_app_id="$(az account show --query user.name --output tsv)"
          deploying_principal_object_id="$(az ad sp show --id "$deploying_principal_app_id" --query id --output tsv)"

          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infrastructure/main.bicep \
            --parameters \
              appName="$APP_NAME" \
              location="$AZURE_LOCATION" \
              appEnvironment="$APP_ENV" \
              investecSandbox="$INVESTEC_SANDBOX" \
              deployingUserObjectId="$deploying_principal_object_id" \
              containerImage="$container_image" \
              configureRuntimeSecrets=true \
            --output none
